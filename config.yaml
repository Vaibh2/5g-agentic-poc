network:
  name: "5G-CORE-PROD"
  type: "standalone"
  version: "r2"

sector:
  id: "SECTOR-7"
  location: "Mumbai-Metro-North"
  cells:
    - cell_id: "CELL-7A"
      frequency_band: "n78"
      bandwidth_mhz: 100
    - cell_id: "CELL-7B"
      frequency_band: "n78"
      bandwidth_mhz: 100
    - cell_id: "CELL-7C"
      frequency_band: "n257"
      bandwidth_mhz: 400

routing:
  mtu_size: 1500
  bgp_asn: 65001
  bgp_route_preference: 100
  peering:
    - peer_asn: 65002
      peer_ip: "10.7.0.2"
      prefix_limit: 1000
  qos_policy: "enhanced"

transport:
  uplink_gbps: 10
  downlink_gbps: 20
  redundancy: "active-active"

security:
  encryption: "aes-256-gcm"
  authentication: "mutual-tls"
  firewall_rules:
    - rule_id: "ALLOW-5G-CORE"
      source: "10.0.0.0/8"
      destination: "10.0.0.0/8"
      port: 5000-6000
      protocol: "tcp"
      action: "permit"
    - rule_id: "ALLOW-MGMT"
      source: "172.16.0.0/12"
      destination: "10.0.0.0/8"
      port: 22
      protocol: "tcp"
      action: "permit"
    - rule_id: "ALLOW-BGP"
      source: "10.7.0.0/24"
      destination: "10.7.0.0/24"
      port: 179
      protocol: "tcp"
      action: "permit"
    - rule_id: "DENY-DEFAULT"
      source: "0.0.0.0/0"
      destination: "0.0.0.0/0"
      action: "deny"

monitoring:
  enabled: true
  metrics:
    - latency_ms
    - packet_loss_pct
    - cpu_usage_pct
    - throughput_gbps
    - error_rate_pct
  alert_thresholds:
    latency_ms: 500
    packet_loss_pct: 5
    cpu_usage_pct: 80
